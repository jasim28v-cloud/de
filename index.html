<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexTalk | المستقبل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.0/dist/vanilla-tilt.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Inter', sans-serif; }
        body { overflow-y: auto; height: 100%; width: 100%; position: relative; }
        
        /* Animated Background */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        /* Glassmorphism Effect */
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; transition: all 0.3s ease; }
        .glass-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
        
        /* Light Mode */
        body.light-mode { background: linear-gradient(135deg, #f5f7fa, #e4e8f0); }
        body.light-mode .glass { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.1); }
        body.light-mode .glass-card { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.05); }
        body.light-mode .message.received .message-bubble { background: rgba(0,0,0,0.05); color: #000; }
        body.light-mode .chat-input-area input { background: rgba(0,0,0,0.05); color: #000; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        /* Auth Screen */
        .auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
        .auth-card { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 480px; text-align: center; border: 1px solid rgba(255,255,255,0.2); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-card h1 { font-size: 48px; font-weight: 800; margin-bottom: 24px; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 14px 18px; margin: 8px 0; border-radius: 40px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 15px; transition: 0.3s; }
        .auth-card input:focus { border-color: #a855f7; outline: none; }
        .auth-card button { width: 100%; padding: 14px; margin-top: 16px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; border-radius: 40px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .auth-card button:hover { transform: scale(1.02); opacity: 0.9; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #ff6b6b; font-size: 12px; margin-top: 8px; }
        .auth-link { margin-top: 28px; color: #aaa; font-size: 13px; }
        .auth-link a { color: #a855f7; text-decoration: none; }

        /* Main App */
        #mainApp { display: none; width: 100%; height: 100%; position: relative; z-index: 1; }
        .app-container { display: flex; width: 100%; height: 100%; gap: 12px; padding: 12px; }

        /* Sidebar - Modern */
        .chat-sidebar { width: 360px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header h2 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar { padding: 16px; }
        .search-bar input { width: 100%; padding: 12px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; color: #fff; font-size: 14px; transition: 0.3s; }
        .search-bar input:focus { border-color: #a855f7; outline: none; background: rgba(255,255,255,0.15); }
        .chats-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; transition: all 0.3s ease; border-radius: 20px; margin-bottom: 4px; }
        .chat-item:hover { background: rgba(255,255,255,0.1); transform: translateX(-4px); }
        .chat-item.active { background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(59,130,246,0.2)); border: 1px solid rgba(168,85,247,0.3); }
        .chat-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #a855f7, #3b82f6); overflow: hidden; flex-shrink: 0; position: relative; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #22c55e; border-radius: 50%; border: 2px solid #000; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .chat-last-message { font-size: 12px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: linear-gradient(135deg, #a855f7, #3b82f6); color: #fff; font-size: 10px; border-radius: 50%; min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }

        /* Main Chat - Modern */
        .chat-main { flex: 1; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 16px; }
        .chat-header-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #a855f7, #3b82f6); overflow: hidden; cursor: pointer; transition: 0.3s; }
        .chat-header-avatar:hover { transform: scale(1.05); }
        .chat-header-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .chat-header-status { font-size: 12px; color: rgba(255,255,255,0.6); }
        .chat-actions { display: flex; gap: 12px; margin-right: auto; }
        .chat-action-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.3s; }
        .chat-action-btn:hover { background: linear-gradient(135deg, #a855f7, #3b82f6); transform: scale(1.1); }

        /* Messages - Modern */
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; max-width: 75%; animation: messageIn 0.3s ease; }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 12px 16px; border-radius: 24px; font-size: 14px; line-height: 1.4; backdrop-filter: blur(10px); transition: 0.2s; }
        .message.sent .message-bubble { background: linear-gradient(135deg, #a855f7, #3b82f6); color: #fff; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: rgba(255,255,255,0.1); color: #fff; border-bottom-left-radius: 4px; }
        .message-media { margin-top: 8px; border-radius: 16px; overflow: hidden; max-width: 280px; }
        .message-media img { width: 100%; border-radius: 16px; cursor: pointer; transition: 0.3s; }
        .message-media img:hover { transform: scale(1.02); }
        .message-time { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }

        /* Input Area - Modern */
        .chat-input-area { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 14px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; color: #fff; font-size: 14px; transition: 0.3s; }
        .chat-input-area input:focus { border-color: #a855f7; outline: none; background: rgba(255,255,255,0.15); }
        .chat-input-area button { background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.3s; }
        .chat-input-area button:hover { background: linear-gradient(135deg, #a855f7, #3b82f6); transform: scale(1.1); }

        /* Modal - Modern */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-content { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-radius: 40px; padding: 32px; width: 90%; max-width: 520px; border: 1px solid rgba(255,255,255,0.2); max-height: 85vh; overflow-y: auto; animation: fadeInUp 0.4s ease; }

        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.6); }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(168,85,247,0.2); border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #customToast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #a855f7, #3b82f6); color: #fff; padding: 12px 24px; border-radius: 60px; z-index: 1200; font-size: 13px; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }

        @media (max-width: 768px) { .chat-sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(0); transition: 0.3s; } .chat-sidebar.hide { transform: translateX(-100%); } .chat-main { width: 100%; } .app-container { gap: 0; padding: 0; } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1>NexTalk</h1>
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button onclick="login()">دخول</button>
                <div id="loginMsg" class="error-msg"></div>
                <div class="auth-link">ليس لديك حساب؟ <a href="#" onclick="switchAuth('register')">إنشاء حساب</a></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regName" placeholder="الاسم">
                <input type="email" id="regEmail" placeholder="البريد">
                <input type="text" id="regUsername" placeholder="اسم المستخدم">
                <input type="password" id="regPass" placeholder="كلمة المرور">
                <input type="password" id="regConfirmPass" placeholder="تأكيد">
                <button onclick="register()">إنشاء حساب</button>
                <div id="regMsg" class="error-msg"></div>
                <div class="auth-link">لديك حساب؟ <a href="#" onclick="switchAuth('login')">تسجيل الدخول</a></div>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <div class="app-container">
            <div class="chat-sidebar" id="chatSidebar">
                <div class="sidebar-header"><h2>NexTalk</h2><div class="sidebar-avatar" onclick="openProfile()"><i class="fas fa-user-circle fa-2x" style="color:#a855f7;"></i></div></div>
                <div class="search-bar"><input type="text" id="searchChats" placeholder="بحث..." onkeyup="searchChats()"></div>
                <div class="chats-list" id="chatsList"><div class="loading"><div class="spinner"></div><span>تحميل...</span></div></div>
                <div style="padding: 16px;"><button onclick="openNewChatModal()" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-full text-sm font-medium">+ محادثة جديدة</button></div>
            </div>
            <div class="chat-main">
                <div class="chat-header" id="chatHeader" style="display:none;">
                    <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                    <div class="chat-header-info"><h3 id="chatHeaderName"></h3><span class="chat-header-status" id="chatHeaderStatus"></span></div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" onclick="startCall('audio')" id="callAudioBtn" style="display:none;"><i class="fas fa-phone"></i></button>
                        <button class="chat-action-btn" onclick="startCall('video')" id="callVideoBtn" style="display:none;"><i class="fas fa-video"></i></button>
                        <button class="chat-action-btn" onclick="openChatSettings()"><i class="fas fa-ellipsis-h"></i></button>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"><div class="loading"><div class="spinner"></div><span>اختر محادثة</span></div></div>
                <div class="chat-input-area" id="chatInputArea" style="display:none;">
                    <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="messageInput" placeholder="اكتب رسالة...">
                    <button id="recordBtn" onclick="startRecording()"><i class="fas fa-microphone"></i></button>
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="sendFile()">
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal"><div class="modal-content"><h3 style="text-align:center;margin-bottom:24px;">الملف الشخصي</h3><div id="profileAvatarLarge" style="width:100px;height:100px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#a855f7,#3b82f6);"></div><input type="text" id="profileName" placeholder="الاسم" style="width:100%;padding:12px;background:rgba(255,255,255,0.1);border-radius:40px;border:none;color:#fff;margin-bottom:12px;"><textarea id="profileBio" placeholder="السيرة" rows="2" style="width:100%;padding:12px;background:rgba(255,255,255,0.1);border-radius:20px;border:none;color:#fff;"></textarea><button onclick="saveProfile()" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-full mt-4">حفظ</button><button onclick="logout()" class="w-full bg-red-500 text-white py-3 rounded-full mt-2">تسجيل خروج</button></div></div>
    <div id="chatSettingsModal" class="modal"><div class="modal-content"><h3>الإعدادات</h3><button onclick="clearChat()" class="w-full bg-red-500 text-white py-3 rounded-full mt-2">مسح المحادثة</button><button onclick="blockUser()" class="w-full bg-red-500 text-white py-3 rounded-full mt-2">حظر</button><button onclick="closeChatSettings()" class="w-full bg-gray-600 text-white py-3 rounded-full mt-4">إلغاء</button></div></div>
    <div id="callModal" class="modal"><div class="modal-content" style="text-align:center;"><div id="remoteVideo" style="width:100%;height:300px;background:#000;border-radius:20px;"></div><div id="localVideo" style="width:100px;height:120px;position:absolute;bottom:20px;right:20px;background:#000;border-radius:12px;"></div><div style="display:flex;gap:20px;justify-content:center;margin-top:20px;"><button onclick="endCall()" class="bg-red-500 text-white p-4 rounded-full"><i class="fas fa-phone-slash fa-2x"></i></button></div></div></div>
    <div id="imageModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center;" onclick="closeImageModal()"><img id="modalImage" style="max-width:90%;max-height:90%;border-radius:20px;"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        // 3D Animated Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 30;
        
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xa855f7, roughness: 0.3, metalness: 0.7, emissive: 0x3b82f6, emissiveIntensity: 0.2 });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);
        
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 2000;
            starsPositions[i+1] = (Math.random() - 0.5) * 1000;
            starsPositions[i+2] = (Math.random() - 0.5) * 500;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.01;
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
