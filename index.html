<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Web Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://cdn.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111b21;
            color: #e9edef;
            overflow: hidden;
            height: 100vh;
        }

        /* الوضع الليلي (أساسي) */
        body.light-mode {
            background: #f0f2f5;
            color: #111b21;
        }
        body.light-mode .chat-sidebar { background: #fff; border-left-color: #e9edef; }
        body.light-mode .chat-header { background: #f0f2f5; border-bottom-color: #e9edef; }
        body.light-mode .message-bubble { background: #e9edef; color: #111b21; }
        body.light-mode .message-bubble.sent { background: #d9f0c3; }
        body.light-mode .input-area { background: #f0f2f5; border-top-color: #e9edef; }
        body.light-mode .chat-item:hover { background: #f5f6f6; }

        /* شاشة تسجيل الدخول */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #111b21;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #2a2f36;
            border-radius: 24px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        .auth-card h1 { font-size: 28px; font-weight: 600; margin-bottom: 30px; color: #25d366; }
        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border-radius: 30px;
            background: #3b4048;
            border: none;
            color: white;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #25d366;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: #3b4048;
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            border-radius: 60px;
        }
        .auth-tab.active { background: #25d366; color: white; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #ff5555; font-size: 12px; margin-top: 8px; }

        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100vh; display: flex; }

        /* الشريط الجانبي (قائمة المحادثات) */
        .chat-sidebar {
            width: 380px;
            background: #1e2a32;
            border-left: 1px solid #2a2f36;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            background: #1e2a32;
            border-bottom: 1px solid #2a2f36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { font-size: 20px; font-weight: 600; color: #25d366; }
        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2f36;
        }
        .search-box input {
            width: 100%;
            background: #2a2f36;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
        }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #2a2f36; }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: #8696a0; }

        /* منطقة المحادثة */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111b21;
        }
        .chat-header {
            padding: 12px 16px;
            background: #1e2a32;
            border-bottom: 1px solid #2a2f36;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25d366;
            overflow: hidden;
        }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; }
        .chat-header-status { font-size: 12px; color: #8696a0; }
        .call-buttons { display: flex; gap: 16px; }
        .call-btn {
            background: none;
            border: none;
            color: #25d366;
            font-size: 20px;
            cursor: pointer;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            max-width: 70%;
            margin-bottom: 4px;
        }
        .message.sent { align-self: flex-end; justify-content: flex-end; }
        .message.received { align-self: flex-start; }
        .message-bubble {
            background: #2a2f36;
            padding: 8px 12px;
            border-radius: 18px;
            word-break: break-word;
        }
        .message.sent .message-bubble { background: #005c4b; }
        .message-time { font-size: 10px; color: #8696a0; margin-top: 4px; text-align: right; }
        .message-status { font-size: 10px; margin-left: 4px; color: #25d366; }
        .message-media { max-width: 200px; max-height: 200px; border-radius: 12px; cursor: pointer; }
        .input-area {
            padding: 12px 16px;
            background: #1e2a32;
            border-top: 1px solid #2a2f36;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: #2a2f36;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
        }
        .attach-btn, .send-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #25d366;
            cursor: pointer;
        }

        /* لوحة المكالمة */
        .call-panel {
            position: fixed;
            inset: 0;
            background: #111b21;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .call-panel.open { display: flex; }
        .call-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .call-controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
        }
        .call-control {
            background: #2a2f36;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
        }
        .call-end { background: #ff4444; color: white; }

        .loading { text-align: center; padding: 50px; color: #8696a0; }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(37,211,102,0.3);
            border-top-color: #25d366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>WhatsApp Web</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="error-msg"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="error-msg"></div>
        </div>
        <div class="version">WhatsApp Web Clone | v1.0</div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp">
    <div class="chat-sidebar">
        <div class="sidebar-header">
            <h2>WhatsApp</h2>
            <div class="profile-avatar" id="profileAvatar" onclick="openProfile()">👤</div>
        </div>
        <div class="search-box">
            <input type="text" id="searchChats" placeholder="بحث أو بدء محادثة جديدة">
        </div>
        <div class="chats-list" id="chatsList"></div>
        <div class="p-4 border-t border-[#2a2f36]">
            <button onclick="newChat()" class="w-full bg-[#25d366] text-white p-2 rounded-full">محادثة جديدة</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="flex items-center justify-center h-full text-gray-500">اختر محادثة للبدء</div>
    </div>

    <!-- لوحة المكالمة -->
    <div id="callPanel" class="call-panel">
        <video id="localVideo" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
        <video id="remoteVideo" autoplay playsinline style="position: absolute; width: 120px; height: 160px; bottom: 100px; right: 20px; border-radius: 12px; object-fit: cover;"></video>
        <div class="call-controls">
            <button class="call-control" onclick="toggleMicrophone()"><i class="fas fa-microphone"></i></button>
            <button class="call-control" onclick="toggleCamera()"><i class="fas fa-video"></i></button>
            <button class="call-control call-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <!-- لوحة الملف الشخصي -->
    <div id="profilePanel" class="fixed inset-0 bg-black/80 z-[600] hidden flex items-center justify-center">
        <div class="bg-[#1e2a32] rounded-2xl p-6 w-80 text-center">
            <div class="profile-avatar w-24 h-24 mx-auto mb-4" id="profileAvatarLarge">👤</div>
            <h3 id="profileNameLarge" class="text-xl font-bold"></h3>
            <p id="profileStatus" class="text-gray-400 text-sm mt-1"></p>
            <button onclick="closeProfile()" class="mt-4 bg-[#25d366] px-4 py-2 rounded-full">إغلاق</button>
        </div>
    </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
