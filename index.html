<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VibeChat - تواصل عبر @المعرف</title>
  <meta name="description" content="VibeChat - تطبيق محادثة احترافي يعتمد على البريد الإلكتروني والمعرف @Username" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b141a; color: #e9edef; }
    .glass { background: rgba(17, 27, 33, 0.8); backdrop-filter: blur(12px); }
    .glass-strong { background: rgba(17, 27, 33, 0.95); backdrop-filter: blur(20px); }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.2)} }
    .pulse-dot { animation: pulse-dot 2s infinite; }
    @keyframes typing { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .typing-dot { animation: typing 1.4s infinite; }
    audio::-webkit-media-controls-panel { background: #2a3942; }
    .message-bubble { transition: all 0.2s ease; }
    .message-bubble:active { transform: scale(0.98); }
    #attachment-preview { animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">

  <!-- ============ AUTH SCREEN ============ -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-[#00a884] mx-auto flex items-center justify-center mb-4">
          <span class="text-white font-bold text-2xl">V</span>
        </div>
        <h1 class="text-2xl font-bold text-white">VibeChat</h1>
        <p class="text-sm text-gray-400 mt-1">تواصل عبر @المعرف</p>
      </div>

      <div class="glass-strong rounded-2xl p-6">
        <div class="flex mb-6 bg-white/5 rounded-lg p-1">
          <button onclick="showAuthTab('login')" id="tab-login" class="flex-1 py-2 rounded-md text-sm font-medium bg-[#00a884] text-white transition-all">تسجيل الدخول</button>
          <button onclick="showAuthTab('register')" id="tab-register" class="flex-1 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white transition-all">حساب جديد</button>
        </div>

        <p id="auth-error" class="hidden text-xs text-red-400 text-center bg-red-500/10 rounded-lg py-2 mb-4"></p>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="login-email" type="email" placeholder="البريد الإلكتروني" required class="w-full h-11 rounded-lg bg-white/5 pl-4 pr-10 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="login-password" type="password" placeholder="كلمة المرور" required minlength="6" class="w-full h-11 rounded-lg bg-white/5 pl-4 pr-10 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <button id="login-btn" type="submit" class="w-full h-11 rounded-lg bg-[#00a884] hover:bg-[#00a884]/90 text-white font-medium text-sm flex items-center justify-center gap-2 transition-colors">تسجيل الدخول</button>
        </form>

        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
          <div class="relative">
            <input id="reg-displayname" type="text" placeholder="الاسم الظاهر" class="w-full h-11 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <div class="relative">
            <input id="reg-username" type="text" placeholder="اسم المستخدم (username)" required class="w-full h-11 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <div class="relative">
            <input id="reg-email" type="email" placeholder="البريد الإلكتروني" required class="w-full h-11 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <div class="relative">
            <input id="reg-password" type="password" placeholder="كلمة المرور" required minlength="6" class="w-full h-11 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          </div>
          <button id="reg-btn" type="submit" class="w-full h-11 rounded-lg bg-[#00a884] hover:bg-[#00a884]/90 text-white font-medium text-sm flex items-center justify-center gap-2 transition-colors">إنشاء حساب</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ APP SCREEN ============ -->
  <div id="app-screen" class="hidden h-screen w-screen flex overflow-hidden">

    <div id="left-panel" class="flex h-full w-full sm:w-auto">

      <div class="flex flex-col items-center justify-between h-full w-[68px] py-6 glass-strong border-r border-white/5">
        <div class="flex flex-col items-center gap-1">
          <div id="sidebar-avatar" class="w-10 h-10 rounded-xl bg-[#00a884] flex items-center justify-center mb-6 text-white font-bold text-lg overflow-hidden">V</div>
          <button onclick="showPanel('chats')" class="w-12 h-12 flex items-center justify-center rounded-xl hover:bg-white/5 transition text-gray-400 hover:text-white" title="المحادثات">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button onclick="showPanel('search')" class="w-12 h-12 flex items-center justify-center rounded-xl hover:bg-white/5 transition text-gray-400 hover:text-white" title="بحث">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </button>
          <button onclick="showPanel('profile')" class="w-12 h-12 flex items-center justify-center rounded-xl hover:bg-white/5 transition text-gray-400 hover:text-white" title="الملف الشخصي">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </div>
        <button onclick="handleLogoutSafe()" class="w-12 h-12 flex items-center justify-center rounded-xl text-gray-400 hover:text-red-400 transition" title="خروج">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>

      <div class="flex-1 sm:w-[340px] h-full border-r border-white/5 flex flex-col">

        <div id="chats-panel" class="flex flex-col h-full">
          <div class="px-4 pt-4 pb-3">
            <div class="flex items-center justify-between mb-3">
              <h1 class="text-xl font-semibold text-white">المحادثات</h1>
              <button onclick="showPanel('search')" class="w-9 h-9 rounded-lg bg-[#00a884]/10 hover:bg-[#00a884]/20 flex items-center justify-center transition">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00a884" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>
          <div id="chat-list" class="flex-1 overflow-y-auto scrollbar-thin px-2"></div>
        </div>

        <div id="search-panel" class="hidden flex flex-col h-full">
          <div class="px-4 pt-4 pb-3">
            <div class="flex items-center gap-3 mb-3">
              <button onclick="showPanel('chats')" class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-400 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <h2 class="text-lg font-semibold text-white">بحث عن مستخدم</h2>
            </div>
            <div class="relative">
              <input id="user-search-input" type="text" placeholder="ابحث بـ @username..." oninput="handleUserSearch()" class="w-full h-10 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
            </div>
          </div>
          <div id="search-results" class="flex-1 overflow-y-auto scrollbar-thin px-2"></div>
        </div>

        <div id="profile-panel" class="hidden flex flex-col h-full">
          <div class="flex items-center gap-3 px-4 h-16 border-b border-white/5">
            <button onclick="showPanel('chats')" class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-400 hover:text-white">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h2 class="text-lg font-semibold text-white">الملف الشخصي</h2>
          </div>
          <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="flex flex-col items-center">
              <div class="relative">
                <div id="profile-avatar" class="w-28 h-28 rounded-full bg-[#2a3942] flex items-center justify-center overflow-hidden text-4xl font-bold text-white">?</div>
                <label class="absolute bottom-0 right-0 w-10 h-10 rounded-full bg-[#00a884] flex items-center justify-center cursor-pointer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <input type="file" accept="image/*" class="hidden" onchange="uploadAvatar(this.files[0])" />
                </label>
              </div>
              <p id="profile-username" class="text-gray-400 text-sm mt-2">@username</p>
            </div>
            <div class="space-y-4">
              <div>
                <label class="text-xs text-gray-500 block mb-1 text-right">الاسم الظاهر</label>
                <input id="edit-displayname" type="text" class="w-full h-10 rounded-lg bg-white/5 px-4 text-sm text-white outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1 text-right">النبذة</label>
                <textarea id="edit-bio" rows="3" class="w-full rounded-lg bg-white/5 px-4 py-2 text-sm text-white outline-none focus:ring-1 focus:ring-[#00a884]/50 resize-none text-right" dir="rtl"></textarea>
              </div>
            </div>
            <button onclick="updateProfileInfo()" class="w-full h-10 rounded-lg bg-[#00a884] hover:bg-[#00a884]/90 text-white text-sm font-medium transition-colors">حفظ التعديلات</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="hidden sm:flex flex-1 flex-col h-full min-w-0">
      <div class="flex items-center justify-between px-4 h-16 border-b border-white/5 glass flex-shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="goBackMobile()" class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-400 hover:text-white sm:hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div id="chat-header-avatar" class="w-10 h-10 rounded-full bg-[#2a3942] flex items-center justify-center text-white font-semibold text-sm overflow-hidden">?</div>
          <div>
            <h2 id="chat-header-name" class="text-sm font-semibold text-white"></h2>
            <p class="text-xs"><span id="chat-header-username" class="text-gray-400"></span> · <span id="chat-header-status" class="text-gray-500">غير متصل</span></p>
            <div id="typing-indicator" class="hidden text-xs text-[#00a884]">يكتب...</div>
          </div>
        </div>
        <div class="flex items-center gap-1">
          <button onclick="startCallFixed(false)" class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/5 transition" title="مكالمة صوتية">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </button>
          <button onclick="startCallFixed(true)" class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/5 transition" title="مكالمة فيديو">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
        </div>
      </div>

      <!-- Reply Preview -->
      <div id="reply-preview" class="hidden px-3 pt-2"></div>

      <!-- Messages -->
      <div id="messages-area" class="flex-1 overflow-y-auto scrollbar-thin px-4 py-4 space-y-1"></div>

      <!-- Attachment Preview -->
      <div id="attachment-preview" class="hidden fixed bottom-24 left-4 right-4 bg-[#1a2730] rounded-xl p-2 z-20"></div>

      <div class="px-3 py-3 border-t border-white/5 glass flex-shrink-0">
        <div id="normal-input" class="flex items-center gap-2">
          <label id="attach-btn" class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/5 cursor-pointer transition">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <input type="file" accept="image/*,video/*" class="hidden" onchange="handleAttachmentSelect(this.files[0])" />
          </label>
          <input id="msg-input" type="text" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter'){handleSendMessage();}else{onTypingStart();}" class="flex-1 h-10 rounded-lg bg-white/5 px-4 text-sm text-white placeholder:text-gray-500 outline-none focus:ring-1 focus:ring-[#00a884]/50 text-right" dir="rtl" />
          <button onclick="if($('msg-input').value.trim()){handleSendMessage()}else{startRecordingFixed()}" class="w-10 h-10 rounded-lg bg-[#00a884] hover:bg-[#00a884]/90 flex items-center justify-center text-white transition" id="send-or-mic-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

        <div id="recording-input" class="hidden flex items-center gap-2">
          <button onclick="cancelRecordingFixed()" class="w-10 h-10 rounded-lg flex items-center justify-center text-red-400 hover:bg-red-500/10 transition">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="flex-1 flex items-center justify-center gap-3">
            <div class="w-3 h-3 rounded-full bg-red-500 pulse-dot"></div>
            <span id="rec-timer" class="text-sm text-white font-mono">0:00</span>
            <span class="text-xs text-gray-400">جارٍ التسجيل...</span>
          </div>
          <button onclick="sendVoiceMessageFixed()" class="w-10 h-10 rounded-lg bg-[#00a884] hover:bg-[#00a884]/90 flex items-center justify-center text-white transition">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="empty-chat" class="hidden sm:flex flex-1 items-center justify-center">
      <div class="text-center">
        <div class="w-20 h-20 rounded-2xl bg-[#00a884]/10 mx-auto flex items-center justify-center mb-4">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00a884" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h2 class="text-xl font-semibold text-white mb-2">VibeChat</h2>
        <p class="text-gray-500 text-sm">اختر محادثة أو ابحث عن مستخدم بـ @username</p>
      </div>
    </div>

    <!-- Call Screen -->
    <div id="call-screen" class="hidden fixed inset-0 z-50 bg-[#0b141a] flex flex-col items-center justify-center">
      <div id="remote-video" class="hidden absolute inset-0 bg-[#1a2730]"></div>
      <div id="call-avatar-area" class="flex flex-col items-center z-10">
        <div class="w-24 h-24 rounded-full bg-[#2a3942] flex items-center justify-center text-3xl font-bold text-white mb-4">?</div>
        <p id="call-user-name" class="text-white font-semibold text-lg"></p>
        <p id="call-user-handle" class="text-gray-400 text-sm"></p>
        <p id="call-status" class="text-[#00a884] text-xs mt-2 pulse-dot">جارٍ الاتصال...</p>
      </div>
      <div id="local-video" class="hidden absolute top-4 right-4 w-32 h-44 rounded-xl overflow-hidden border-2 border-white/10 z-20 bg-[#2a3942]"></div>
      <div class="absolute bottom-8 flex items-center gap-4 z-30">
        <button id="mic-btn" onclick="toggleMic()" class="w-14 h-14 rounded-full bg-[#2a3942] flex items-center justify-center text-white">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button onclick="endCall()" class="w-16 h-16 rounded-full bg-red-500 flex items-center justify-center text-white">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    function showAuthTab(tab) {
      document.getElementById("auth-error").classList.add("hidden");
      if (tab === "login") {
        document.getElementById("login-form").classList.remove("hidden");
        document.getElementById("register-form").classList.add("hidden");
        document.getElementById("tab-login").className = "flex-1 py-2 rounded-md text-sm font-medium bg-[#00a884] text-white transition-all";
        document.getElementById("tab-register").className = "flex-1 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white transition-all";
      } else {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("register-form").classList.remove("hidden");
        document.getElementById("tab-register").className = "flex-1 py-2 rounded-md text-sm font-medium bg-[#00a884] text-white transition-all";
        document.getElementById("tab-login").className = "flex-1 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white transition-all";
      }
    }

    function $(id) { return document.getElementById(id); }
    function hide(id) { const el = $(id); if (el) el.classList.add("hidden"); }
    function show(id) { const el = $(id); if (el) el.classList.remove("hidden"); }
  </script>

  <script type="module" src="./script.js"></script>
</body>
</html>
