<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TGramE | المنصة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.19.0/index.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/gif.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; overflow-y: auto; height: 100%; width: 100%; -webkit-overflow-scrolling: touch; }
        *:focus { outline: none; }

        /* Light Mode */
        body.light-mode { background: #eef2f5; color: #111; }
        body.light-mode .chat-sidebar { background: #fff; border-left-color: #eef2f5; }
        body.light-mode .chat-main { background: #fff; }
        body.light-mode .message-bubble.received { background: #eef2f5; color: #111; }
        body.light-mode .chat-header { background: #fff; border-bottom-color: #eef2f5; }
        body.light-mode .chat-input-area { background: #fff; border-top-color: #eef2f5; }
        body.light-mode .sidebar-header { background: #fff; border-bottom-color: #eef2f5; }
        body.light-mode .chat-item:hover { background: #f5f7f9; }
        body.light-mode .modal-content { background: #fff; border-color: #eef2f5; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2f3336; border-radius: 10px; }

        /* Auth Screen */
        .auth-screen { position: fixed; inset: 0; z-index: 1000; background: linear-gradient(135deg, #0a0a0a, #1a1a2e); display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-radius: 32px; padding: 40px 32px; width: 90%; max-width: 440px; text-align: center; border: 1px solid rgba(29,155,240,0.3); }
        .auth-card h1 { font-size: 44px; font-weight: 800; margin-bottom: 28px; background: linear-gradient(135deg, #1d9bf0, #f91880); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 14px 18px; margin: 8px 0; border-radius: 40px; background: #1a1a1a; border: 1px solid #2f3336; color: #fff; font-size: 15px; }
        .auth-card input:focus { border-color: #1d9bf0; }
        .auth-card button { width: 100%; padding: 12px; margin-top: 16px; background: #1d9bf0; border: none; border-radius: 40px; color: #fff; font-weight: 600; cursor: pointer; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #f91880; font-size: 12px; margin-top: 8px; text-align: left; }
        .auth-link { margin-top: 28px; color: #71767b; font-size: 13px; }
        .auth-link a { color: #1d9bf0; text-decoration: none; font-weight: 600; }

        /* Main App */
        #mainApp { display: none; width: 100%; height: 100%; position: relative; }
        .app-container { display: flex; width: 100%; height: 100%; }

        /* Sidebar */
        .chat-sidebar { width: 320px; background: #111; border-left: 1px solid #2f3336; display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #2f3336; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header h2 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #1d9bf0, #f91880); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #1d9bf0, #f91880); overflow: hidden; cursor: pointer; }
        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-bar { padding: 12px; border-bottom: 1px solid #2f3336; }
        .search-bar input { width: 100%; padding: 10px 16px; background: #1a1a1a; border: 1px solid #2f3336; border-radius: 40px; color: #fff; font-size: 14px; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #2f3336; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #2f3336; }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #1d9bf0, #f91880); overflow: hidden; flex-shrink: 0; position: relative; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #00ff00; border-radius: 50%; border: 2px solid #111; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .chat-last-message { font-size: 12px; color: #71767b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pinned-chat { background: rgba(29,155,240,0.1); border-right: 3px solid #1d9bf0; }

        /* Main Chat */
        .chat-main { flex: 1; display: flex; flex-direction: column; height: 100%; background: #0a0a0a; }
        .chat-header { padding: 12px 20px; border-bottom: 1px solid #2f3336; display: flex; align-items: center; gap: 16px; }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #1d9bf0, #f91880); overflow: hidden; }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .chat-header-status { font-size: 12px; color: #71767b; }
        .chat-actions { display: flex; gap: 16px; margin-right: auto; }
        .chat-action-btn { background: none; border: none; color: #1d9bf0; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .chat-action-btn:hover { background: rgba(29,155,240,0.1); }

        /* Messages */
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; max-width: 70%; position: relative; }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .message.sent .message-bubble { background: #1d9bf0; color: #fff; border-bottom-left-radius: 4px; }
        .message.received .message-bubble { background: #1a1a2a; color: #fff; border-bottom-right-radius: 4px; }
        .message-media { margin-top: 6px; border-radius: 12px; overflow: hidden; max-width: 250px; }
        .message-media img, .message-media video { width: 100%; border-radius: 12px; cursor: pointer; }
        .message-actions { position: absolute; top: -20px; right: 0; display: none; gap: 8px; background: #2f3336; padding: 4px 8px; border-radius: 20px; }
        .message:hover .message-actions { display: flex; }
        .message-action-btn { background: none; border: none; color: #1d9bf0; cursor: pointer; font-size: 12px; padding: 2px 6px; }
        .message-time { font-size: 10px; color: #71767b; margin-top: 4px; text-align: right; }
        .reply-preview { background: rgba(29,155,240,0.1); padding: 8px; border-radius: 12px; margin-bottom: 6px; font-size: 12px; border-right: 3px solid #1d9bf0; }

        /* Input Area */
        .chat-input-area { padding: 12px 16px; border-top: 1px solid #2f3336; background: #0a0a0a; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .chat-input-area input { flex: 1; padding: 12px 16px; background: #1a1a1a; border: 1px solid #2f3336; border-radius: 40px; color: #fff; outline: none; font-size: 14px; }
        .chat-input-area button { background: none; border: none; color: #1d9bf0; font-size: 22px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .emoji-picker { position: absolute; bottom: 70px; right: 20px; z-index: 100; display: none; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-content { background: #111; border-radius: 24px; padding: 24px; width: 90%; max-width: 500px; border: 1px solid #2f3336; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 12px 16px; margin: 10px 0; background: #1a1a1a; border: 1px solid #2f3336; border-radius: 40px; color: #fff; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
        .modal-create { background: #1d9bf0; color: #fff; }
        .modal-cancel { background: #2f3336; color: #fff; }

        /* Poll */
        .poll-option { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .poll-option input { flex: 1; }
        .poll-result { background: #2f3336; border-radius: 20px; height: 30px; margin: 5px 0; position: relative; overflow: hidden; }
        .poll-result-bar { background: #1d9bf0; height: 100%; width: 0%; transition: width 0.3s; }
        .poll-result-text { position: absolute; right: 10px; top: 5px; font-size: 12px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; padding: 8px 0 16px; z-index: 100; }
        .nav-item { background: none; border: none; font-size: 24px; color: #71767b; cursor: pointer; padding: 6px; border-radius: 40px; }
        .nav-item.active { color: #1d9bf0; }

        .loading { text-align: center; padding: 40px; color: #71767b; }
        .spinner { width: 32px; height: 32px; border: 2px solid rgba(29,155,240,0.2); border-top-color: #1d9bf0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #customToast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1d9bf0; color: #fff; padding: 8px 20px; border-radius: 40px; z-index: 1200; font-size: 13px; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; }
        @media (max-width: 768px) { .chat-sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(0); transition: 0.3s; } .chat-sidebar.hide { transform: translateX(-100%); } .chat-main { width: 100%; } }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>TGramE</h1>
        <div id="loginForm" class="auth-form active">
            <div style="text-align: right; margin-bottom: 20px;"><h2 style="font-size: 22px; font-weight: 700;">تسجيل الدخول</h2><p style="color:#71767b; margin-top:4px;">قم بالوصول إلى حسابك</p></div>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <div id="twoFactorSection" style="display:none;"><input type="text" id="twoFactorCode" placeholder="رمز التحقق بخطوتين"></div>
            <button onclick="login()">تسجيل الدخول</button>
            <div id="loginMsg" class="error-msg"></div>
            <div class="auth-link">ليس لديك حساب؟ <a href="#" onclick="switchAuth('register')">إنشاء حساب</a></div>
        </div>
        <div id="registerForm" class="auth-form">
            <div style="text-align: right; margin-bottom: 20px;"><h2 style="font-size: 22px; font-weight: 700;">إنشاء حساب</h2><p style="color:#71767b; margin-top:4px;">قم بإنشاء حسابك</p></div>
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="error-msg"></div>
            <div class="auth-link">لديك حساب بالفعل؟ <a href="#" onclick="switchAuth('login')">تسجيل الدخول</a></div>
        </div>
    </div>
</div>

<div id="mainApp">
    <div class="app-container">
        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header"><h2>TGramE</h2><div class="sidebar-avatar" id="sidebarAvatar" onclick="openProfile()"><i class="fas fa-user"></i></div></div>
            <div class="search-bar"><input type="text" id="searchChats" placeholder="بحث عن محادثة..." onkeyup="searchChats()"></div>
            <div class="chats-list" id="chatsList"><div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div></div>
            <div style="padding:12px; border-top:1px solid #2f3336; display:flex; gap:8px;">
                <button onclick="openNewChatModal()" class="flex-1 bg-[#1d9bf0] text-white py-2 rounded-full text-sm"><i class="fas fa-plus"></i> محادثة</button>
                <button onclick="openCreateGroupModal()" class="flex-1 bg-[#2f3336] text-white py-2 rounded-full text-sm"><i class="fas fa-users"></i> مجموعة</button>
            </div>
        </div>
        <div class="chat-main" id="chatMain">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                <div class="chat-header-info"><h3 id="chatHeaderName"></h3><span class="chat-header-status" id="chatHeaderStatus"></span></div>
                <div class="chat-actions">
                    <button class="chat-action-btn" onclick="startCall('audio')" id="callAudioBtn" style="display:none;"><i class="fas fa-phone"></i></button>
                    <button class="chat-action-btn" onclick="startCall('video')" id="callVideoBtn" style="display:none;"><i class="fas fa-video"></i></button>
                    <button class="chat-action-btn" onclick="openChatSettings()" id="chatSettingsBtn"><i class="fas fa-ellipsis-h"></i></button>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"><div class="loading"><div class="spinner"></div><span>اختر محادثة للبدء</span></div></div>
            <div class="chat-input-area" id="chatInputArea" style="display:none;">
                <button onclick="toggleEmojiPicker()"><i class="fas fa-smile"></i></button>
                <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
                <button onclick="openGifPicker()"><i class="fas fa-film"></i></button>
                <input type="text" id="messageInput" placeholder="اكتب رسالة...">
                <button id="recordBtn" onclick="startRecording()"><i class="fas fa-microphone"></i></button>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <input type="file" id="fileInput" accept="image/*,video/*,application/pdf,application/msword,application/zip" style="display:none" onchange="sendFile()">
                <div id="emojiPicker" class="emoji-picker"></div>
            </div>
        </div>
    </div>
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('chats')"><i class="fas fa-comments"></i></button>
        <button class="nav-item" onclick="openCalls()"><i class="fas fa-phone"></i></button>
        <button class="nav-item" onclick="openSettings()"><i class="fas fa-cog"></i></button>
    </div>
</div>

<!-- Modals -->
<div id="newChatModal" class="modal"><div class="modal-content"><div class="modal-title">محادثة جديدة</div><input type="text" id="searchUser" placeholder="بحث عن مستخدم..." onkeyup="searchUsers()"><div id="usersList"></div><div class="modal-buttons"><button class="modal-cancel" onclick="closeNewChatModal()">إلغاء</button></div></div></div>
<div id="createGroupModal" class="modal"><div class="modal-content"><div class="modal-title">إنشاء مجموعة</div><input type="text" id="groupName" placeholder="اسم المجموعة"><input type="text" id="groupSearchUser" placeholder="بحث عن مستخدمين..." onkeyup="searchGroupUsers()"><div id="groupUsersList"></div><div id="selectedUsers" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;"></div><div class="modal-buttons"><button class="modal-cancel" onclick="closeCreateGroupModal()">إلغاء</button><button class="modal-create" onclick="createGroup()">إنشاء</button></div></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><div class="modal-title">الملف الشخصي</div><div style="text-align:center;"><div class="chat-avatar" style="width:80px;height:80px;margin:0 auto;" id="profileAvatarModal"></div><button class="text-[#1d9bf0] text-sm mt-2" onclick="changeProfilePhoto()">تغيير الصورة</button></div><input type="text" id="profileName" placeholder="الاسم"><textarea id="profileBio" placeholder="السيرة الذاتية" rows="2" style="width:100%; padding:12px; background:#1a1a1a; border:1px solid #2f3336; border-radius:20px; color:#fff;"></textarea><div class="modal-buttons"><button class="modal-cancel" onclick="closeProfileModal()">إلغاء</button><button class="modal-create" onclick="saveProfile()">حفظ</button></div><button onclick="enable2FA()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2 text-sm">تفعيل التحقق بخطوتين</button><button onclick="showSessions()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2 text-sm">إدارة الجلسات</button><button onclick="logout()" class="w-full bg-[#f91880] text-white py-2 rounded-full mt-2 text-sm">تسجيل خروج</button></div></div>
<div id="chatSettingsModal" class="modal"><div class="modal-content"><div class="modal-title">إعدادات المحادثة</div><button onclick="toggleMuteNotifications()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2">كتم الإشعارات</button><button onclick="pinChat()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2">تثبيت المحادثة</button><button onclick="archiveChat()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2">أرشفة المحادثة</button><button onclick="clearChat()" class="w-full bg-[#f91880] text-white py-2 rounded-full mt-2">مسح المحادثة</button><button onclick="blockUser()" class="w-full bg-[#f91880] text-white py-2 rounded-full mt-2">حظر المستخدم</button><div class="modal-buttons"><button class="modal-cancel" onclick="closeChatSettings()">إغلاق</button></div></div></div>
<div id="groupSettingsModal" class="modal"><div class="modal-content"><div class="modal-title">إعدادات المجموعة</div><input type="text" id="groupEditName" placeholder="اسم المجموعة"><textarea id="groupEditDesc" placeholder="وصف المجموعة" rows="2" style="width:100%; padding:12px; background:#1a1a1a; border:1px solid #2f3336; border-radius:20px; color:#fff;"></textarea><button onclick="changeGroupPhoto()" class="w-full bg-[#2f3336] text-white py-2 rounded-full mt-2">تغيير صورة المجموعة</button><button onclick="createGroupInviteLink()" class="w-full bg-[#1d9bf0] text-white py-2 rounded-full mt-2">إنشاء رابط دعوة</button><div id="groupMembersList"></div><button onclick="leaveGroup()" class="w-full bg-[#f91880] text-white py-2 rounded-full mt-2">مغادرة المجموعة</button><div class="modal-buttons"><button class="modal-cancel" onclick="closeGroupSettings()">إغلاق</button><button class="modal-create" onclick="saveGroupSettings()">حفظ</button></div></div></div>
<div id="createPollModal" class="modal"><div class="modal-content"><div class="modal-title">إنشاء استطلاع رأي</div><input type="text" id="pollQuestion" placeholder="السؤال"><div id="pollOptions"><div class="poll-option"><input type="text" placeholder="خيار 1"></div><div class="poll-option"><input type="text" placeholder="خيار 2"></div></div><button onclick="addPollOption()" class="text-[#1d9bf0]">+ إضافة خيار</button><div class="modal-buttons"><button class="modal-cancel" onclick="closePollModal()">إلغاء</button><button class="modal-create" onclick="createPoll()">إنشاء</button></div></div></div>
<div id="imageModal" class="image-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:2000; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; cursor:pointer;"><div style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;">&times;</div><img id="modalImage" style="max-width:95%; max-height:95%; object-fit:contain;"></div>
<div id="callModal" class="modal" style="background:rgba(0,0,0,0.95);"><div class="remote-video" id="remoteVideo" style="width:80%; max-width:800px; margin:auto;"></div><div class="local-video" id="localVideo" style="position:absolute; bottom:20px; right:20px; width:120px; height:160px; background:#1a1a1a; border-radius:12px; overflow:hidden;"></div><div style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:20px;"><button class="call-btn" id="muteBtn" onclick="toggleMute()" style="width:60px; height:60px; border-radius:50%; background:#2f3336; color:white; border:none;"><i class="fas fa-microphone"></i></button><button class="call-btn" id="videoBtn" onclick="toggleVideo()" style="width:60px; height:60px; border-radius:50%; background:#2f3336; color:white; border:none;"><i class="fas fa-video"></i></button><button class="call-btn" onclick="endCall()" style="width:60px; height:60px; border-radius:50%; background:#f91880; color:white; border:none;"><i class="fas fa-phone-slash"></i></button></div></div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
