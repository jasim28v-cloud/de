<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeChat | محادثات فورية متطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0b141a; color: #e9edef; min-height: 100vh; }
        
        /* Auth Screen */
        .auth-screen { position: fixed; inset: 0; z-index: 1000; background: #0b141a; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #202c33; border-radius: 32px; padding: 40px 32px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .auth-card h1 { font-size: 38px; font-weight: 800; margin-bottom: 8px; color: #00a884; }
        .auth-card input { width: 100%; padding: 14px 18px; margin: 10px 0; border-radius: 28px; background: #2a3942; border: none; color: #e9edef; font-size: 15px; }
        .auth-card input:focus { outline: none; background: #3b4a54; }
        .auth-card button { width: 100%; padding: 14px; margin-top: 16px; background: #00a884; border: none; border-radius: 28px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .auth-card button:hover { background: #008f6f; }
        .auth-card .switch-btn { background: transparent; color: #00a884; border: 1px solid #00a884; margin-top: 12px; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #ff6b6b; font-size: 12px; margin-top: 8px; }
        .auth-footer { margin-top: 24px; color: #8696a0; font-size: 13px; }
        .auth-footer a { color: #00a884; cursor: pointer; }

        /* Main App */
        #mainApp { display: none; height: 100vh; background: #0b141a; }
        .app-container { display: flex; height: 100%; }

        /* Sidebar */
        .sidebar { width: 80px; background: #111b21; border-left: 1px solid #2a3942; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 24px; }
        .sidebar-avatar { width: 48px; height: 48px; border-radius: 50%; background: #00a884; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-icon { color: #8696a0; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .sidebar-icon:hover { color: #00a884; }

        /* Users List */
        .users-list { width: 320px; background: #202c33; border-left: 1px solid #2a3942; display: flex; flex-direction: column; height: 100%; }
        .users-header { padding: 20px; border-bottom: 1px solid #2a3942; }
        .users-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px 16px; background: #2a3942; border: none; border-radius: 28px; color: #e9edef; font-size: 14px; }
        .search-box button { background: #00a884; border: none; border-radius: 28px; padding: 0 20px; color: white; cursor: pointer; }
        .users-container { flex: 1; overflow-y: auto; padding: 12px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 20px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
        .user-item:hover { background: #2a3942; }
        .user-item.active { background: #2a3942; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: #00a884; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .user-username { font-size: 12px; color: #8696a0; }
        .user-status { font-size: 10px; color: #00a884; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b141a; }
        .chat-header { padding: 16px 24px; background: #202c33; border-bottom: 1px solid #2a3942; display: flex; align-items: center; justify-content: space-between; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; background: #00a884; overflow: hidden; }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header-name h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .chat-header-status { font-size: 11px; color: #8696a0; }
        .chat-actions { display: flex; gap: 16px; }
        .chat-action { background: none; border: none; color: #aebac1; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .chat-action:hover { background: #2a3942; color: #00a884; }

        /* Messages */
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; max-width: 70%; animation: fadeIn 0.2s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .message.sent .message-bubble { background: #005c4b; color: white; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: #202c33; color: #e9edef; border-bottom-left-radius: 4px; }
        .message-actions { position: absolute; top: -30px; right: 0; display: none; gap: 8px; background: #2a3942; padding: 6px 12px; border-radius: 20px; z-index: 10; }
        .message:hover .message-actions { display: flex; }
        .message-action { background: none; border: none; color: #aebac1; cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 12px; }
        .message-action:hover { background: #3b4a54; color: #00a884; }
        .reply-preview { background: rgba(0,168,132,0.2); padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 12px; border-right: 3px solid #00a884; }
        .message-media { margin-top: 6px; border-radius: 12px; overflow: hidden; max-width: 250px; cursor: pointer; }
        .message-media img { width: 100%; border-radius: 12px; }
        .message-audio audio { height: 36px; border-radius: 20px; }
        .message-time { font-size: 10px; color: #8696a0; margin-top: 4px; text-align: right; }
        .pinned-message { background: rgba(0,168,132,0.1); padding: 8px 12px; border-radius: 12px; margin-bottom: 12px; font-size: 12px; border-right: 3px solid #00a884; cursor: pointer; }

        /* Input Area */
        .input-area { padding: 16px; background: #202c33; display: flex; gap: 12px; align-items: center; }
        .input-area input { flex: 1; padding: 12px 18px; background: #2a3942; border: none; border-radius: 28px; color: #e9edef; font-size: 14px; }
        .input-area input:focus { outline: none; }
        .input-area button { background: none; border: none; color: #aebac1; font-size: 22px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .input-area button:hover { color: #00a884; background: #2a3942; }
        .emoji-picker { position: absolute; bottom: 80px; right: 20px; background: #202c33; border-radius: 20px; padding: 12px; display: none; z-index: 100; width: 320px; max-height: 300px; overflow-y: auto; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-content { background: #202c33; border-radius: 28px; padding: 28px; width: 90%; max-width: 460px; }
        .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 12px 16px; background: #2a3942; border: none; border-radius: 28px; color: #e9edef; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 28px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn-primary { background: #00a884; color: white; }
        .modal-btn-secondary { background: #2a3942; color: white; }

        /* Call Modal */
        .call-modal { position: fixed; inset: 0; background: #000; z-index: 1100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.2s; }
        .call-modal.open { opacity: 1; visibility: visible; }
        .remote-video { width: 100%; height: 80%; background: #000; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; background: #000; border-radius: 12px; overflow: hidden; }
        .call-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; background: #2a3942; color: white; }
        .call-end { background: #dc2626; }

        .loading { text-align: center; padding: 40px; color: #8696a0; }
        .spinner { width: 32px; height: 32px; border: 2px solid rgba(0,168,132,0.2); border-top-color: #00a884; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2a3942; color: white; padding: 10px 20px; border-radius: 28px; font-size: 13px; z-index: 1200; opacity: 0; transition: 0.2s; pointer-events: none; white-space: nowrap; }

        @media (max-width: 768px) { .users-list { width: 280px; } .message { max-width: 85%; } }
    </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>💚 VibeChat</h1>
        <p class="text-sm text-gray-400 mb-6">تواصل مع أصدقائك بكل سهولة</p>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">تسجيل الدخول</button>
            <button class="switch-btn" onclick="switchAuth('register')">إنشاء حساب جديد</button>
            <div id="loginMsg" class="error-msg"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="text" id="regUsername" placeholder="اسم المستخدم (بدون @)">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <button class="switch-btn" onclick="switchAuth('login')">لديك حساب؟ تسجيل الدخول</button>
            <div id="regMsg" class="error-msg"></div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-avatar" id="sidebarAvatar" onclick="openProfile()">
                <i class="fas fa-user"></i>
            </div>
            <i class="fas fa-search sidebar-icon" onclick="openSearchModal()"></i>
            <i class="fas fa-bell sidebar-icon" onclick="openNotifications()"></i>
            <i class="fas fa-cog sidebar-icon" onclick="openSettings()"></i>
            <i class="fas fa-sign-out-alt sidebar-icon" style="margin-top: auto;" onclick="logout()"></i>
        </div>
        
        <!-- Users List -->
        <div class="users-list">
            <div class="users-header">
                <h2>المستخدمين</h2>
                <div class="search-box">
                    <input type="text" id="searchUserInput" placeholder="ابحث باسم المستخدم..." onkeyup="searchUsers()">
                    <button onclick="searchUsers()">بحث</button>
                </div>
            </div>
            <div class="users-container" id="usersContainer">
                <div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <div class="chat-header-avatar" id="chatAvatar"></div>
                    <div class="chat-header-name">
                        <h3 id="chatName"></h3>
                        <span class="chat-header-status" id="chatStatus"></span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action" id="pinChatBtn" onclick="pinChat()"><i class="fas fa-thumbtack"></i></button>
                    <button class="chat-action" id="muteChatBtn" onclick="toggleMuteChat()"><i class="fas fa-bell-slash"></i></button>
                    <button class="chat-action" id="audioCallBtn" onclick="startCall('audio')"><i class="fas fa-phone"></i></button>
                    <button class="chat-action" id="videoCallBtn" onclick="startCall('video')"><i class="fas fa-video"></i></button>
                    <button class="chat-action" id="blockUserBtn" onclick="blockUser()"><i class="fas fa-ban"></i></button>
                </div>
            </div>
            
            <div id="pinnedMessageBar" class="pinned-message" style="display: none;"></div>
            
            <div class="messages-area" id="messagesArea">
                <div class="loading"><div class="spinner"></div><span>اختر مستخدم لبدء المحادثة</span></div>
            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <button onclick="toggleEmojiPicker()"><i class="far fa-smile"></i></button>
                <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="اكتب رسالة...">
                <button id="recordBtn" onclick="startRecording()"><i class="fas fa-microphone"></i></button>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*,application/pdf,application/msword,application/zip" style="display: none" onchange="sendFile()">
                <div id="replyPreview" style="display: none;" class="reply-preview"></div>
            </div>
            <div id="emojiPicker" class="emoji-picker"></div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="searchModal" class="modal"><div class="modal-content"><div class="modal-title">🔍 إضافة مستخدم جديد</div><input type="text" id="searchUsername" class="modal-input" placeholder="@username"><div id="searchResult"></div><div class="modal-buttons"><button class="modal-btn-secondary" onclick="closeSearchModal()">إلغاء</button><button class="modal-btn-primary" onclick="searchByUsername()">بحث</button></div></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><div class="modal-title">👤 الملف الشخصي</div><div style="text-align:center;margin-bottom:16px;"><div id="profileAvatar" class="w-20 h-20 rounded-full bg-[#00a884] mx-auto flex items-center justify-center overflow-hidden"><i class="fas fa-user fa-3x text-white"></i></div><button class="text-[#00a884] text-sm mt-2" onclick="changeProfilePhoto()">تغيير الصورة</button></div><input type="text" id="profileNameInput" class="modal-input" placeholder="الاسم"><input type="text" id="profileUsernameInput" class="modal-input" placeholder="اسم المستخدم"><textarea id="profileBioInput" class="modal-input" rows="3" placeholder="السيرة الذاتية"></textarea><div class="modal-buttons"><button class="modal-btn-secondary" onclick="closeProfileModal()">إلغاء</button><button class="modal-btn-primary" onclick="saveProfile()">حفظ</button></div></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><div class="modal-title">⚙️ الإعدادات</div><button onclick="toggleTheme()" class="w-full bg-[#2a3942] text-white py-3 rounded-full mb-2">🌙 الوضع الليلي/النهاري</button><button onclick="requestNotificationPermission()" class="w-full bg-[#2a3942] text-white py-3 rounded-full mb-2">🔔 تفعيل الإشعارات</button><button onclick="clearAllChats()" class="w-full bg-red-600 text-white py-3 rounded-full mb-2">🗑️ مسح جميع المحادثات</button><div class="modal-buttons"><button class="modal-btn-secondary" onclick="closeSettingsModal()">إغلاق</button></div></div></div>
<div id="callModal" class="call-modal"><div id="remoteVideo" class="remote-video"></div><div id="localVideo" class="local-video"></div><div class="call-controls"><button class="call-btn" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone"></i></button><button class="call-btn" id="videoToggleBtn" onclick="toggleVideoTrack()"><i class="fas fa-video"></i></button><button class="call-btn call-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button></div></div>

<div id="toast" class="toast"></div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
