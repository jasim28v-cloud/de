<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeChat | الدردشة والاتصال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b141a; color: #e9edef; }
        .glass { background: rgba(32, 44, 51, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.06; }
    </style>
</head>
<body class="h-screen overflow-hidden flex">
    <!-- Sidebar Icons -->
    <div class="w-16 glass flex flex-col items-center py-6 gap-8 border-l border-white/5 z-20">
        <div id="userAvatar" class="w-10 h-10 rounded-full bg-[#00a884] flex items-center justify-center font-bold text-white">V</div>
        <div class="flex flex-col gap-6 text-gray-400">
            <i data-lucide="message-square" class="cursor-pointer hover:text-[#00a884]"></i>
            <i data-lucide="users" class="cursor-pointer hover:text-[#00a884]"></i>
            <i data-lucide="settings" class="cursor-pointer hover:text-[#00a884]"></i>
        </div>
        <div class="mt-auto"><i data-lucide="log-out" id="logoutBtn" class="text-red-400 cursor-pointer"></i></div>
    </div>

    <!-- Chat List -->
    <div class="w-80 glass flex flex-col border-l border-white/5 z-10">
        <div class="p-4">
            <h1 class="text-2xl font-bold font-display mb-4">المحادثات</h1>
            <div class="relative">
                <i data-lucide="search" class="absolute right-3 top-2.5 text-gray-500 w-4"></i>
                <input id="userSearch" type="text" placeholder="بحث بالمعرف @username" class="w-full bg-[#202c33] rounded-xl py-2 pr-10 pl-4 text-sm focus:outline-none focus:ring-1 focus:ring-[#00a884]">
            </div>
        </div>
        <div id="chatList" class="flex-1 overflow-y-auto">
            <!-- المحادثات تظهر هنا -->
        </div>
    </div>

    <!-- Main Chat Window -->
    <div class="flex-1 flex flex-col relative">
        <div class="chat-bg absolute inset-0"></div>
        
        <!-- Header -->
        <div id="chatHeader" class="h-16 glass flex items-center px-6 justify-between z-10">
            <div class="flex items-center gap-4">
                <div id="activeAvatar" class="w-10 h-10 rounded-full bg-[#202c33]"></div>
                <div>
                    <h2 id="activeName" class="font-bold">اختر محادثة</h2>
                    <p id="activeStatus" class="text-xs text-[#00a884]"></p>
                </div>
            </div>
            <div class="flex gap-6 text-gray-400">
                <i data-lucide="phone" id="audioCallBtn" class="cursor-pointer hover:text-[#00a884]"></i>
                <i data-lucide="video" id="videoCallBtn" class="cursor-pointer hover:text-[#00a884]"></i>
                <i data-lucide="more-vertical" class="cursor-pointer"></i>
            </div>
        </div>

        <!-- Messages -->
        <div id="messageArea" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3 z-10"></div>

        <!-- Input -->
        <div class="p-4 glass z-10 flex items-center gap-4">
            <i data-lucide="plus" id="uploadBtn" class="text-gray-400 cursor-pointer hover:text-white"></i>
            <input id="messageInput" type="text" placeholder="اكتب رسالة..." class="flex-1 bg-[#2a3942] rounded-xl py-3 px-6 focus:outline-none">
            <button id="sendBtn" class="bg-[#00a884] p-3 rounded-full text-white hover:scale-105 transition-transform">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Call Overlay -->
    <div id="callOverlay" class="hidden fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center">
        <div id="remoteVideo" class="w-full h-full absolute inset-0"></div>
        <div id="localVideo" class="w-48 h-64 absolute bottom-10 left-10 glass rounded-2xl overflow-hidden border-2 border-[#00a884]"></div>
        <button id="endCallBtn" class="absolute bottom-10 bg-red-500 p-4 rounded-full text-white z-50">
            <i data-lucide="phone-off"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script type="module" src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
