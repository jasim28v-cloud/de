<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111b21;
            color: #e9edef;
            height: 100vh;
            overflow: hidden;
        }
        
        /* WhatsApp Colors */
        .whatsapp-green { background: #00a884; }
        .whatsapp-dark { background: #111b21; }
        .whatsapp-sidebar { background: #202c33; }
        .whatsapp-chat { background: #0b141a; }
        .whatsapp-message-sent { background: #005c4b; }
        .whatsapp-message-received { background: #202c33; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #2a3942; }
        ::-webkit-scrollbar-thumb { background: #3b4a54; border-radius: 3px; }
        
        /* Auth Screen */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #111b21;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #202c33;
            border-radius: 32px;
            padding: 48px 40px;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        .auth-card h1 { font-size: 32px; font-weight: 700; margin-bottom: 24px; color: #00a884; }
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 24px;
            background: #2a3942;
            border: none;
            color: #e9edef;
            font-size: 15px;
        }
        .auth-card input:focus { outline: none; background: #3b4a54; }
        .auth-card button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #00a884;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #ff6b6b; font-size: 12px; margin-top: 8px; }
        .auth-link { margin-top: 28px; color: #8696a0; font-size: 13px; }
        .auth-link a { color: #00a884; text-decoration: none; }

        /* Main App */
        #mainApp { display: none; width: 100%; height: 100%; }
        .app-container { display: flex; width: 100%; height: 100%; }

        /* Sidebar - WhatsApp Style */
        .chat-sidebar {
            width: 380px;
            background: #202c33;
            border-left: 1px solid #2a3942;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .sidebar-header {
            padding: 16px 20px;
            background: #202c33;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a3942;
        }
        .sidebar-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-icons { display: flex; gap: 20px; }
        .sidebar-icons i { font-size: 20px; color: #aebac1; cursor: pointer; }
        
        .search-bar { padding: 12px 16px; background: #202c33; }
        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: #2a3942;
            border: none;
            border-radius: 24px;
            color: #e9edef;
            font-size: 14px;
        }
        .search-bar input::placeholder { color: #8696a0; }
        
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2a3942;
        }
        .chat-item:hover { background: #2a3942; }
        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #00a884;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00a884;
            border-radius: 50%;
            border: 2px solid #202c33;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 500; font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .chat-last-message { font-size: 13px; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: #8696a0; }

        /* Main Chat - WhatsApp Style */
        .chat-main {
            flex: 1;
            background: #0b141a;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        .chat-header {
            padding: 12px 20px;
            background: #202c33;
            border-bottom: 1px solid #2a3942;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #00a884;
            overflow: hidden;
            cursor: pointer;
        }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .chat-header-status { font-size: 12px; color: #8696a0; }
        .chat-actions { display: flex; gap: 20px; margin-right: auto; }
        .chat-actions i { font-size: 20px; color: #aebac1; cursor: pointer; }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" opacity="0.05"><path fill="%238696a0" d="M0,0 L1000,0 L1000,1000 L0,1000 Z M0,0 L1000,1000 M1000,0 L0,1000"/></svg>');
            background-repeat: repeat;
        }
        .message {
            display: flex;
            max-width: 65%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message.received { align-self: flex-start; }
        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }
        .message.sent .message-bubble {
            background: #005c4b;
            color: #e9edef;
            border-bottom-right-radius: 4px;
        }
        .message.received .message-bubble {
            background: #202c33;
            color: #e9edef;
            border-bottom-left-radius: 4px;
        }
        .message-media {
            margin-top: 6px;
            border-radius: 12px;
            overflow: hidden;
            max-width: 250px;
            cursor: pointer;
        }
        .message-media img { width: 100%; border-radius: 12px; }
        .message-audio audio { height: 36px; }
        .message-time {
            font-size: 10px;
            color: #8696a0;
            margin-top: 4px;
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            padding: 12px 16px;
            background: #202c33;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #2a3942;
            border: none;
            border-radius: 24px;
            color: #e9edef;
            font-size: 14px;
        }
        .chat-input-area input::placeholder { color: #8696a0; }
        .chat-input-area button {
            background: none;
            border: none;
            color: #aebac1;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-content {
            background: #202c33;
            border-radius: 24px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            border-radius: 28px;
        }
        
        /* User Card */
        .user-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #2a3942;
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .user-card:hover { background: #3b4a54; }
        .user-avatar { width: 52px; height: 52px; border-radius: 50%; background: #00a884; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; margin-bottom: 4px; }
        .user-status { font-size: 12px; color: #8696a0; }
        .user-actions { display: flex; gap: 12px; }
        .user-action { background: #3b4a54; border: none; color: #e9edef; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        .loading { text-align: center; padding: 40px; color: #8696a0; }
        .spinner { width: 32px; height: 32px; border: 2px solid #00a88433; border-top-color: #00a884; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #customToast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a3942;
            color: #e9edef;
            padding: 10px 20px;
            border-radius: 24px;
            z-index: 1200;
            font-size: 13px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .remote-video, .local-video { background: #000; border-radius: 16px; overflow: hidden; }
        .remote-video { width: 100%; height: 400px; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>💚 WhatsApp</h1>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">تسجيل الدخول</button>
            <div id="loginMsg" class="error-msg"></div>
            <div class="auth-link">ليس لديك حساب؟ <a href="#" onclick="switchAuth('register')">إنشاء حساب</a></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="text" id="regPhone" placeholder="رقم الهاتف (مثال: 05xxxxxxxx)">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="error-msg"></div>
            <div class="auth-link">لديك حساب؟ <a href="#" onclick="switchAuth('login')">تسجيل الدخول</a></div>
        </div>
    </div>
</div>

<div id="mainApp">
    <div class="app-container">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar" id="sidebarAvatar" onclick="openProfile()">
                    <i class="fas fa-user"></i>
                </div>
                <div class="sidebar-icons">
                    <i class="fas fa-circle-notch"></i>
                    <i class="fas fa-comment" onclick="openNewChatModal()"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="searchChats" placeholder="بحث أو بدء محادثة جديدة" onkeyup="searchChats()">
            </div>
            <div class="chats-list" id="chatsList">
                <div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="chat-main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                <div class="chat-header-info">
                    <h3 id="chatHeaderName"></h3>
                    <span class="chat-header-status" id="chatHeaderStatus"></span>
                </div>
                <div class="chat-actions">
                    <i class="fas fa-phone" onclick="startCall('audio')" id="callAudioBtn"></i>
                    <i class="fas fa-video" onclick="startCall('video')" id="callVideoBtn"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="loading"><div class="spinner"></div><span>💬 اختر محادثة للبدء</span></div>
            </div>
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="اكتب رسالة...">
                <button id="recordBtn" onclick="startRecording()"><i class="fas fa-microphone"></i></button>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="sendFile()">
            </div>
        </div>
    </div>
</div>

<!-- New Chat Modal -->
<div id="newChatModal" class="modal">
    <div class="modal-content">
        <h3 class="text-center text-xl font-bold mb-4">💬 محادثة جديدة</h3>
        <input type="text" id="searchPhone" placeholder="🔍 بحث برقم الهاتف أو الاسم" class="w-full p-3 rounded-full bg-[#2a3942] border-none text-white mb-4" onkeyup="searchUsersByPhone()">
        <div id="usersList" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="closeNewChatModal()" class="w-full bg-[#2a3942] text-white py-3 rounded-full mt-4">إلغاء</button>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3 class="text-center text-xl font-bold mb-4">👤 الملف الشخصي</h3>
        <div class="flex justify-center mb-4">
            <div id="profileAvatarLarge" class="w-24 h-24 rounded-full bg-[#00a884] flex items-center justify-center overflow-hidden">
                <i class="fas fa-user fa-3x text-white"></i>
            </div>
        </div>
        <input type="text" id="profileName" placeholder="الاسم" class="w-full p-3 rounded-full bg-[#2a3942] border-none text-white mb-3">
        <input type="text" id="profilePhone" placeholder="رقم الهاتف" class="w-full p-3 rounded-full bg-[#2a3942] border-none text-white mb-3">
        <textarea id="profileBio" placeholder="حالة" rows="2" class="w-full p-3 rounded-2xl bg-[#2a3942] border-none text-white mb-3"></textarea>
        <button onclick="saveProfile()" class="w-full bg-[#00a884] text-white py-3 rounded-full mb-2">💾 حفظ</button>
        <button onclick="changeProfilePhoto()" class="w-full bg-[#2a3942] text-white py-3 rounded-full mb-2">📷 تغيير الصورة</button>
        <button onclick="logout()" class="w-full bg-red-600 text-white py-3 rounded-full">🚪 تسجيل خروج</button>
        <button onclick="closeProfileModal()" class="w-full bg-[#2a3942] text-white py-3 rounded-full mt-2">إلغاء</button>
    </div>
</div>

<!-- Call Modal -->
<div id="callModal" class="modal">
    <div class="modal-content" style="background: #0b141a;">
        <div id="remoteVideo" class="remote-video"></div>
        <div id="localVideo" class="local-video"></div>
        <div class="flex justify-center gap-6 mt-4">
            <button onclick="toggleMute()" class="bg-[#2a3942] text-white p-4 rounded-full"><i class="fas fa-microphone fa-2x"></i></button>
            <button onclick="toggleVideo()" class="bg-[#2a3942] text-white p-4 rounded-full"><i class="fas fa-video fa-2x"></i></button>
            <button onclick="endCall()" class="bg-red-600 text-white p-4 rounded-full"><i class="fas fa-phone-slash fa-2x"></i></button>
        </div>
    </div>
</div>

<!-- Image Modal -->
<div id="imageModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:none; align-items:center; justify-content:center; cursor:pointer;" onclick="closeImageModal()">
    <img id="modalImage" style="max-width:90%; max-height:90%; border-radius:16px;">
</div>

<div id="customToast"></div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
