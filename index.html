<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>سوسيال ميديا | منصة التواصل المتكاملة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0b1120, #010101);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
    }

    #app {
      max-width: 550px;
      margin: 20px auto;
      background: rgba(15, 25, 45, 0.55);
      backdrop-filter: blur(18px);
      border-radius: 48px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      min-height: 90vh;
      transition: all 0.2s;
    }

    /* Auth */
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
      padding: 20px;
    }
    .glass {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 40px 30px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #7bc5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }
    .auth-card h2 {
      color: white;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    .auth-card input, .auth-card textarea {
      width: 100%;
      padding: 15px 20px;
      margin: 12px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .auth-card input:focus {
      border-color: #0095f6;
      background: rgba(255,255,255,0.15);
    }
    .auth-card button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 60px;
      background: linear-gradient(90deg, #0095f6, #00c3ff);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .social-buttons {
      display: flex;
      gap: 15px;
      margin: 20px 0;
    }
    .social-buttons button {
      background: rgba(255,255,255,0.15);
    }
    .auth-card p {
      color: #ccc;
      margin-top: 15px;
    }
    .auth-card a {
      color: #0095f6;
      text-decoration: none;
    }

    /* Main app */
    .main-container {
      display: flex;
      flex-direction: column;
      height: 90vh;
    }
    .stories-bar {
      display: flex;
      overflow-x: auto;
      padding: 18px 15px;
      gap: 15px;
      scrollbar-width: thin;
    }
    .story-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9a825, #e91e63, #9c27b0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: 0.2s;
    }
    .story-circle img {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0f1929;
    }
    .add-story {
      background: linear-gradient(135deg, #0095f6, #00c3ff);
      font-size: 28px;
      color: white;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 15px 20px;
    }

    /* Post card */
    .post-card {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s;
    }
    .post-card:hover {
      transform: translateY(-3px);
    }
    .post-header {
      display: flex;
      align-items: center;
      padding: 15px;
      gap: 12px;
      position: relative;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .post-user {
      flex: 1;
    }
    .username {
      font-weight: 700;
      display: block;
      color: white;
    }
    .time {
      font-size: 11px;
      color: #aaa;
    }
    .delete-post-btn {
      background: rgba(255,0,0,0.2);
      border: none;
      padding: 8px 12px;
      border-radius: 30px;
      cursor: pointer;
      color: #ff6b6b;
    }
    .post-media img, .post-media video, .post-media audio {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
    }
    .post-actions {
      display: flex;
      justify-content: space-around;
      padding: 12px 15px;
    }
    .post-actions button {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
    }
    .like-btn.liked {
      color: #ff4757;
    }
    .post-caption {
      padding: 0 15px 10px;
      color: #ddd;
    }
    .comments-section {
      padding: 0 15px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 13px;
    }
    .comment {
      padding: 4px 0;
      color: #ccc;
    }
    .add-comment {
      display: flex;
      padding: 12px 15px;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .add-comment input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 60px;
      padding: 10px 18px;
      color: white;
      outline: none;
    }
    .add-comment button {
      background: #0095f6;
      border: none;
      border-radius: 60px;
      padding: 0 20px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 10px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
      font-size: 12px;
    }
    .nav-item i {
      font-size: 22px;
    }
    .nav-item.active {
      color: #0095f6;
    }

    /* Profile */
    .profile-header {
      text-align: center;
      padding: 20px;
    }
    .profile-avatar-wrapper {
      position: relative;
      display: inline-block;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0095f6;
    }
    #change-avatar-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      background: #0095f6;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }
    .full-name {
      font-size: 1.1rem;
      color: #ccc;
    }
    .bio {
      margin: 8px 0;
      color: #ddd;
    }
    .website {
      color: #0095f6;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 15px 0;
    }
    .stats span {
      font-weight: bold;
      font-size: 1.2rem;
    }
    .profile-tabs {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: white;
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      border-bottom-color: #0095f6;
      color: #0095f6;
    }
    .profile-posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    .profile-post img, .profile-post video, .profile-post audio {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    /* Notifications */
    .notification-item {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 12px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Admin */
    .admin-title {
      text-align: center;
      margin: 20px 0;
    }
    .admin-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px;
    }
    .admin-tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .admin-tab {
      background: transparent;
      border: none;
      color: white;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 30px;
    }
    .admin-tab.active {
      background: #0095f6;
    }
    .admin-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .admin-item {
      background: rgba(0,0,0,0.5);
      border-radius: 28px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-delete, .admin-delete-user {
      background: #ff4757;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      color: white;
    }

    /* Messages */
    .conversations-header {
      padding: 10px;
      text-align: center;
    }
    #new-message-btn {
      background: #0095f6;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      color: white;
    }
    .conversations-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 28px;
      cursor: pointer;
    }
    .conv-info {
      flex: 1;
    }
    .last-message {
      font-size: 12px;
      color: #aaa;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 28px;
      margin-bottom: 10px;
    }
    .chat-user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-user-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 20px;
      position: relative;
    }
    .message.own {
      align-self: flex-end;
      background: #0095f6;
      color: white;
    }
    .message.other {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .message-text {
      word-wrap: break-word;
    }
    .message-media {
      max-width: 200px;
      max-height: 200px;
      border-radius: 12px;
    }
    .message-time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .chat-input-area {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      margin-top: 10px;
    }
    .chat-input-area input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px;
      color: white;
      outline: none;
    }
    .chat-input-area button {
      background: transparent;
      border: none;
      color: #0095f6;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1e2a3a;
      border-radius: 28px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 30px;
      border: none;
      background: #2c3e4e;
      color: white;
    }
    .modal-content button {
      margin: 10px;
      padding: 8px 20px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-bottom: 1px solid #2c3e4e;
      cursor: pointer;
    }
    .search-result img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    /* Recording UI */
    .recording-ui {
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: #000000cc;
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 60px;
      z-index: 1000;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .pulse {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .loading-spinner, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2a3a;
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: 60px;
      color: white;
      z-index: 2000;
      animation: fadeInOut 3s forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      10% { opacity: 1; transform: translateX(-50%) translateY(0); }
      90% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
