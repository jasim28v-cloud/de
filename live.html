<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | البث المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .side-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: white; cursor: pointer; }
        .side-btn i { font-size: 32px; }
        .side-btn.active i { color: #fe2c55; }
        .message-bubble { background: #1a1a1a; padding: 10px 14px; border-radius: 20px; word-break: break-word; max-width: 85%; }
        .message-bubble.sent { background: #fe2c55; color: white; align-self: flex-end; }
        .message-bubble.received { background: #2a2a2a; align-self: flex-start; }
        .gift-animation { position: fixed; font-size: 60px; pointer-events: none; z-index: 1000; animation: giftFloat 1s ease-out forwards; }
        @keyframes giftFloat { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-150px); opacity: 0; } }
        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-track { background: #1a1a1a; }
        .chat-container::-webkit-scrollbar-thumb { background: #fe2c55; border-radius: 10px; }
    </style>
</head>
<body>

<!-- ========== شاشة الدخول ========== -->
<div id="loginScreen" style="position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: #111; border-radius: 32px; padding: 40px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #fe2c55;">
        <h1 style="font-size: 32px; font-weight: bold; color: #fe2c55; margin-bottom: 30px;">SHΔDØW LIVE</h1>
        <input type="text" id="username" placeholder="اسم المستخدم" style="width: 100%; padding: 14px; margin: 10px 0; border-radius: 30px; background: #1a1a1a; border: none; color: white;">
        <button onclick="joinAsBroadcaster()" style="width: 100%; padding: 14px; margin: 10px 0; background: linear-gradient(135deg, #fe2c55, #ff6b6b); border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer;">🔴 بدء بث مباشر</button>
        <button onclick="joinAsViewer()" style="width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #fe2c55; border-radius: 30px; color: white; cursor: pointer;">👀 مشاهدة بث</button>
    </div>
</div>

<!-- ========== واجهة المذيع ========== -->
<div id="broadcasterUI" style="display: none; flex-direction: column; height: 100vh;">
    <div style="position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 30px; z-index: 10;">
        <i class="fas fa-circle text-red-500"></i> <span id="viewerCount">0</span> مشاهدة
    </div>
    <button onclick="endBroadcast()" style="position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4444; border: none; color: white; padding: 12px 24px; border-radius: 50px; z-index: 20; font-weight: bold; cursor: pointer;">⏹️ إنهاء البث</button>
    <div id="localVideo" style="flex: 1; background: #000;"></div>
</div>

<!-- ========== واجهة المشاهد ========== -->
<div id="viewerUI" style="display: none; flex-direction: column; height: 100vh;">
    <div style="position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 30px; z-index: 10;">
        <i class="fas fa-circle text-red-500"></i> <span id="liveViewerCount">0</span> مشاهدة
    </div>
    <button onclick="leaveStream()" style="position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); width: 40px; height: 40px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; z-index: 10;">✕</button>
    
    <div id="remoteVideo" style="flex: 1; background: #000;"></div>
    
    <!-- معلومات المذيع -->
    <div style="position: absolute; bottom: 100px; left: 16px; z-index: 10;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="broadcasterAvatar" style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #fe2c55, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid white;">👤</div>
            <div>
                <div id="broadcasterName" style="font-weight: bold;">@المذيع</div>
                <div id="streamTitle" style="font-size: 12px; opacity: 0.8;">بث مباشر</div>
            </div>
        </div>
    </div>
    
    <!-- الأزرار الجانبية -->
    <div style="position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 24px; z-index: 10;">
        <button class="side-btn" onclick="sendGift('❤️')"><i class="fas fa-gift"></i><span>هدية</span></button>
        <button class="side-btn" onclick="toggleSound()"><i id="soundIcon" class="fas fa-volume-up"></i><span>صوت</span></button>
    </div>
    
    <!-- الدردشة -->
    <div style="position: absolute; bottom: 80px; left: 16px; right: 80px;">
        <div id="chatMessages" class="chat-container" style="max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="أضف تعليق..." style="flex: 1; background: #1a1a1a; border: none; border-radius: 30px; padding: 12px 16px; color: white;">
            <button onclick="sendChat()" style="background: #fe2c55; width: 44px; height: 44px; border-radius: 50%; border: none; color: white; cursor: pointer;">📨</button>
        </div>
    </div>
</div>

<script>
    // ========== إعدادات Agora ==========
    const AGORA_APP_ID = '75d6c13a4f494ea8ad181eb55b641b79';
    let rtc = { client: null, localVideoTrack: null };
    let roomId = 'live_room_001';
    let isBroadcaster = false;
    let remoteAudioEnabled = true;
    
    // انضمام كمذيع
    async function joinAsBroadcaster() {
        const username = document.getElementById('username').value.trim();
        if (!username) { alert('أدخل اسم المستخدم'); return; }
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('broadcasterUI').style.display = 'flex';
        isBroadcaster = true;
        
        rtc.client = AgoraRTC.createClient({ mode: 'live', codec: 'vp8' });
        await rtc.client.join(AGORA_APP_ID, roomId, null, username);
        
        rtc.localVideoTrack = await AgoraRTC.createCameraVideoTrack();
        await rtc.client.publish([rtc.localVideoTrack]);
        rtc.localVideoTrack.play('localVideo');
        
        // تحديث عدد المشاهدين
        setInterval(async () => {
            if (rtc.client) {
                const viewers = await rtc.client.getRemoteUsers();
                document.getElementById('viewerCount').innerText = viewers.length;
            }
        }, 3000);
    }
    
    // انضمام كمشاهد
    async function joinAsViewer() {
        const username = document.getElementById('username').value.trim();
        if (!username) { alert('أدخل اسم المستخدم'); return; }
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('viewerUI').style.display = 'flex';
        isBroadcaster = false;
        
        rtc.client = AgoraRTC.createClient({ mode: 'live', codec: 'vp8' });
        await rtc.client.join(AGORA_APP_ID, roomId, null, username);
        
        rtc.client.on('user-published', async (user, mediaType) => {
            await rtc.client.subscribe(user, mediaType);
            if (mediaType === 'video') {
                user.videoTrack.play('remoteVideo');
                document.getElementById('broadcasterName').innerText = '@' + user.uid;
            }
        });
        
        // تحديث عدد المشاهدين
        setInterval(async () => {
            if (rtc.client) {
                const users = await rtc.client.getRemoteUsers();
                document.getElementById('liveViewerCount').innerText = users.length;
            }
        }, 3000);
    }
    
    // إنهاء البث (للمذيع)
    async function endBroadcast() {
        if (rtc.localVideoTrack) rtc.localVideoTrack.close();
        await rtc.client.leave();
        location.reload();
    }
    
    // مغادرة البث (للمشاهد)
    async function leaveStream() {
        await rtc.client.leave();
        location.reload();
    }
    
    // إرسال هدية
    function sendGift(gift) {
        const animation = document.createElement('div');
        animation.className = 'gift-animation';
        animation.innerHTML = gift;
        animation.style.left = Math.random() * window.innerWidth + 'px';
        animation.style.top = Math.random() * window.innerHeight + 'px';
        document.body.appendChild(animation);
        setTimeout(() => animation.remove(), 1000);
        addChatMessage('🎁 أرسل هدية ' + gift, true);
    }
    
    // تبديل الصوت
    function toggleSound() {
        remoteAudioEnabled = !remoteAudioEnabled;
        const icon = document.getElementById('soundIcon');
        if (remoteAudioEnabled) {
            icon.className = 'fas fa-volume-up';
        } else {
            icon.className = 'fas fa-volume-mute';
        }
        // تطبيق على الصوت البعيد
        if (rtc.client) {
            const users = rtc.client.getRemoteUsers();
            users.forEach(user => {
                if (user.audioTrack) user.audioTrack.setEnabled(remoteAudioEnabled);
            });
        }
    }
    
    // إرسال رسالة دردشة
    function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        addChatMessage(msg, true);
        input.value = '';
    }
    
    function addChatMessage(msg, isSent) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message-bubble ' + (isSent ? 'sent' : 'received');
        div.innerHTML = msg;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
